name: subito_gusto
description: "App per ordinazioni da tavolo tramite QR code - SubitoGusto"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # UI e Design
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  animations: ^2.0.8
  shimmer: ^3.0.0

  # Architettura e Navigazione
  go_router: ^14.0.1
  flutter_riverpod: ^2.5.1

  # Backend e Database
  supabase_flutter: ^2.12.2
  dio: ^5.4.0

  # Serializzazione e Modelli
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Payments
  flutter_stripe: ^11.4.0

  # Web support
  web: ^1.1.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.2
  audioplayers: ^6.0.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.8
  json_serializable: ^6.8.0
  freezed: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/sounds/
